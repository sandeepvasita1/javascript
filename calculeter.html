<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="output.css">
    <script>
        function calculate()
        {
            var num1=parseInt(document.getElementById("num1").value);
            var num2=parseInt(document.getElementById("num2").value);
            var operation=document.getElementById("operation").value;
            var result

            switch (operation)
             {
                case "+":
                    result = num1 + num2 
                    break;
                    case "-":
                    result=num1-num2 
                    break;
                    case "*":
                    result=num1*num2 
                    break;
                    case "/":
                    result=num1/num2 
                    break;
            
                default:
                    result="Invalid Operation"
                   
            }
            document.getElementById("result").innerHTML = "result: " + result;
            
        }
    </script>
</head>
<body>
    Enter number 1:<input type="number" id="num1">
    eNTER NUMBER 2:<input type="number" id="num2">
    <select  id="operation">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>
    <button onclick="calculate()" class="bg-amber-600">Calculate</button>
    <p id="result"></p>
    


</body>
</html>
